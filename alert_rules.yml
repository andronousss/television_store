groups:
  - name: tvstore_alerts
    rules:

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[1m]) > 0.01
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 1%"

      - alert: HighCPU
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CPU usage above 50%"
          description: "CPU is too high"